name: keirin-bot

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  run:

    runs-on: ubuntu-latest

    steps:

      - name: checkout
        uses: actions/checkout@v3

      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: install
        run: pip install -r requirements.txt

      - name: run script
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python main.py
